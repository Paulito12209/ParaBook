<div class="overlay" *ngIf="isOpen()" (click)="close()">
  <div class="search-container" (click)="$event.stopPropagation()">
    
    <div class="search-header">
      <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.3-4.3"/>
      </svg>
      <input 
        #searchInput
        type="text" 
        [(ngModel)]="searchQuery" 
        (input)="onSearch()"
        placeholder="Nach Seiten, Aufgaben oder Projekten suchen..."
        class="search-input"
      >
      <div class="header-actions">
        <button class="filter-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 6h18M6 12h12M10 18h4"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="search-body" *ngIf="searchQuery">
      <div class="results-hint" *ngIf="results().length > 0">Ergebnisse</div>
      
      <div class="results-list">
        @for (item of results(); track item.id) {
          <div class="result-item" (click)="navigate(item)">
            <div class="item-icon">
              <span>{{ item.icon }}</span>
            </div>
            <div class="item-content">
              <div class="item-title">
                {{ item.title }} <span class="item-path">— {{ item.path }}</span>
              </div>
            </div>
          </div>
        }

        @if (results().length === 0 && searchQuery.length > 2) {
          <div class="no-results">Keine Ergebnisse gefunden</div>
        }
      </div>
    </div>

    <div class="search-footer">
      <div class="footer-hint">
        <span><kbd>↵</kbd> zum Öffnen</span>
        <span><kbd>↑↓</kbd> zum Navigieren</span>
        <span><kbd>esc</kbd> zum Schließen</span>
      </div>
    </div>

  </div>
</div>
