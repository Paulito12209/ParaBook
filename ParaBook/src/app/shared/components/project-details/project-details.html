<!-- Project / Area Details -->
<div class="project-details" [class.type-area]="entityType === 'area'">
    @if (project) {
    <!-- Glassmorphism Header -->
    <div class="glass-header">
        <!-- Obere Sektion (60px) -->
        <div class="header-top">
            <button class="back-pill" (click)="goBack()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
                Zurück
            </button>
        </div>

        <!-- Content-Block (Mitte, 120px, vertikal zentriert) -->
        <div class="header-content">
            <span class="type-label">{{ entityType === 'area' ? 'ARBEITSBEREICH' : 'PROJEKT' }}</span>
            <div class="title-row">
                <input [(ngModel)]="project.title" (ngModelChange)="updateProject()" class="title-input" placeholder="Titel eingeben" />
                <div class="due-date-pill" *ngIf="entityType === 'project'">
                    <span class="label">Fällig zum:</span>
                    <svg class="calendar-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    <input type="date" [ngModel]="formatDate(project.dueDate)" (ngModelChange)="updateDueDate($event)" class="date-input" title="Fälligkeitsdatum festlegen" />
                </div>
            </div>
            <div class="meta-badges">
                <span class="badge" [attr.data-status]="project.status">{{ project.status }}</span>
                <span class="badge priority" [attr.data-priority]="project.priority">{{ project.priority }}</span>
            </div>
        </div>

        <!-- Untere Sektion (60px) - momentan leer für Projekte, reserviert für Teilnehmer-Indikator, etc. -->
        <div class="header-bottom">
        </div>
    </div>

    <!-- Action-Bar -->
    <div class="action-bar">
        <div class="action-group">
            <button class="action-btn" aria-label="Bearbeiten" title="Bearbeiten">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                </svg>
                <span class="btn-text">Bearbeiten</span>
            </button>
            <button class="action-btn" (click)="archiveProject()" title="Archivieren">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="21 8 21 21 3 21 3 8"></polyline>
                    <rect x="1" y="3" width="22" height="5"></rect>
                    <line x1="10" y1="12" x2="14" y2="12"></line>
                </svg>
                <span class="btn-text">Archivieren</span>
            </button>
            <button class="action-btn delete" (click)="deleteProject()" title="Löschen">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
                <span class="btn-text">Löschen</span>
            </button>
        </div>
        <button class="action-btn task-toggle" (click)="toggleTaskPanel()" title="Aufgabe verknüpfen oder erstellen">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            <span class="btn-text">Aufgabe</span>
        </button>
    </div>

    <!-- Content -->
    <div class="content-area">
        <div class="tabs-placeholder">
            <p class="placeholder">Inhalte für "{{ project.title }}" werden geladen...</p>
        </div>
    </div>

    <!-- Task Link Side Panel -->
    <app-task-link-panel 
        [parentId]="project.id" 
        [parentType]="entityType" 
        [isOpen]="isTaskPanelOpen"
        (close)="toggleTaskPanel()">
    </app-task-link-panel>
    } @else {
    <div class="no-project">
        <p>Wähle ein {{ entityType === 'area' ? 'Arbeitsbereich' : 'Projekt' }} aus, um Details anzuzeigen</p>
    </div>
    }
</div>
