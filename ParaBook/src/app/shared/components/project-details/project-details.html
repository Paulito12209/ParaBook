<!-- Project Details -->
<div class="project-details">
    @if (project) {
    <div class="project-header">
        <div class="header-content">
            <span class="project-label">Projekt</span>
            <h1>{{ project.title }}</h1>
            <p class="description">{{ project.description || 'Keine Beschreibung vorhanden.' }}</p>
        </div>
    </div>

    <div class="action-bar">
        <div class="action-btn">
            <button (click)="goBack()" class="back-link">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>Zurück</span>
            </button>
            <button class="icon-btn" aria-label="Edit project">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
                </svg>
            </button>
            <button class="icon-btn" (click)="archiveProject()" aria-label="Archive project" title="Archivieren">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="21 8 21 21 3 21 3 8"></polyline>
                    <rect x="1" y="3" width="22" height="5"></rect>
                    <line x1="10" y1="12" x2="14" y2="12"></line>
                </svg>
            </button>
            <button class="icon-btn" aria-label="Delete project">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
            </button>
        </div>
    </div>

    <div class="content-area">
        <div class="tabs-placeholder">
            <!-- Hier kommen später die PARA-spezifischen Tabs rein -->
            <p class="placeholder">Inhalte für "{{ project.title }}" werden geladen...</p>
        </div>
    </div>
    } @else {
    <div class="no-project">
        <p>Wähle ein Projekt aus, um Details anzuzeigen</p>
    </div>
    }
</div>
