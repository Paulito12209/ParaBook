<div class="task-link-panel" [class.open]="isOpen">
    <div class="panel-header">
        <div class="title-group">
            <h3>Aufgabe verknüpfen</h3>
            <span class="subtitle">Bestand oder neu erstellen</span>
        </div>
        <button class="close-btn" (click)="onClose()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
    </div>

    <div class="panel-body">
        <!-- Search & Quick Add Section -->
        <div class="search-area">
            <div class="search-input-wrapper">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="search-icon">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input 
                    type="text" 
                    [(ngModel)]="searchQuery" 
                    placeholder="Aufgabe suchen oder neu erstellen..." 
                    class="search-input"
                    (keyup.enter)="quickAddTask(searchQuery()); searchQuery.set('')"
                />
            </div>
            <p class="hint">Drücke Enter, um eine neue Aufgabe direkt zu erstellen.</p>
        </div>

        <!-- Task List -->
        <div class="tasks-list">
            @for (task of filteredTasks(); track task.id) {
                <div class="task-link-item" [class.linked]="isLinked(task)">
                    <div class="task-info">
                        <span class="task-title">{{ task.title }}</span>
                        <div class="task-meta">
                            <span class="badge" [attr.data-status]="task.status">{{ task.status }}</span>
                            <span class="badge priority" [attr.data-priority]="task.priority">{{ task.priority }}</span>
                        </div>
                    </div>
                    <button class="link-action" (click)="toggleLink(task)" [title]="isLinked(task) ? 'Verknüpfung aufheben' : 'Verknüpfen'">
                        <svg *ngIf="!isLinked(task)" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        <svg *ngIf="isLinked(task)" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12"></polyline>
                        </svg>
                    </button>
                </div>
            } @empty {
                <div class="empty-results">
                    <p>Keine passenden Aufgaben gefunden.</p>
                </div>
            }
        </div>
    </div>
</div>
