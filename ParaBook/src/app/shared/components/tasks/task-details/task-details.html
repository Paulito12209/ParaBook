<div class="task-details" [class.empty]="!task">
    @if (task) {
        <div class="details-header">
            <div class="header-main">
                <h2 class="title">{{ task.title }}</h2>
                <button class="close-btn" (click)="onClose()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            
            <div class="meta-row">
                <span class="status-badge" [attr.data-status]="task.status">{{ task.status }}</span>
                <span class="priority-badge" [attr.data-priority]="task.priority">{{ task.priority }}</span>
            </div>
        </div>

        <div class="details-content">
            <div class="section">
                <h3>Details</h3>
                <div class="info-grid">
                    <div class="info-item">
                        <label>Erstellt am</label>
                        <span>{{ task.createdAt | date:'dd.MM.yyyy HH:mm' }}</span>
                    </div>
                </div>
            </div>

            <div class="actions-section">
                <button class="delete-btn" (click)="onDelete()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                    Aufgabe löschen
                </button>
            </div>
        </div>
    } @else {
        <div class="empty-state">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.1">
                <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
                <rect x="9" y="3" width="6" height="4" rx="2"/>
            </svg>
            <p>Wähle eine Aufgabe aus, um Details anzuzeigen</p>
        </div>
    }
</div>
