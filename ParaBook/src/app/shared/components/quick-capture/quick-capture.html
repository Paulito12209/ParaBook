<div class="overlay" *ngIf="isOpen()" (click)="close()">
  <div class="capture-container" (click)="$event.stopPropagation()">
    
    <div class="capture-header">
      <div class="smart-pills" *ngIf="content.length > 0">
        <button [class.active]="selectedType === 'task'" (click)="setType('task')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          Aufgabe
        </button>
        <button [class.active]="selectedType === 'project'" (click)="setType('project')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
          Projekt
        </button>
        <button [class.active]="selectedType === 'area'" (click)="setType('area')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <circle cx="12" cy="12" r="6"/>
            <circle cx="12" cy="12" r="2"/>
          </svg>
          Arbeitsbereich
        </button>
        <button [class.active]="selectedType === 'resource'" (click)="setType('resource')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          </svg>
          Ressource
        </button>
        <button [class.active]="selectedType === 'meeting'" (click)="setType('meeting')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          Meeting
        </button>
      </div>
      <div class="close-hint" *ngIf="content.length === 0">
        <button class="close-btn" (click)="close()">✕</button>
      </div>
    </div>

    <div class="capture-body">
      <div class="title-hint" *ngIf="selectedType === 'resource'">🔗 URL erkannt: Wird als Ressource gespeichert</div>
      <input 
        #captureInput
        type="text" 
        [(ngModel)]="content" 
        (input)="onInput()"
        (keyup.enter)="save()"
        placeholder="Im Web nach neuen Quellen suchen oder Eintrag erfassen..."
        class="capture-input"
      >
    </div>

    <div class="capture-footer">
      <div class="quick-actions">
        <button class="action-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
          </svg>
          Dateien hochladen
        </button>
        <button class="action-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
          Websites
        </button>
        <button class="action-btn">
          <span>Google Drive</span>
        </button>
        <button class="action-btn">
          <span>Kopierter Text</span>
        </button>
      </div>
      <div class="save-hint">
        <kbd>↵</kbd> zum Speichern
      </div>
    </div>

  </div>
</div>
