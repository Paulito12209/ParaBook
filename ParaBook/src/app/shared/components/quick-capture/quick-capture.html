<div class="overlay" *ngIf="isOpen()" (click)="close()">
  <div class="capture-container" (click)="$event.stopPropagation()">
    
    <div class="capture-header">
      <div class="smart-pills" *ngIf="content.length > 0">
        <button [class.active]="selectedType === 'task'" (click)="setType('task')">✓ Aufgabe</button>
        <button [class.active]="selectedType === 'project'" (click)="setType('project')">📁 Projekt</button>
        <button [class.active]="selectedType === 'area'" (click)="setType('area')">🎯 Arbeitsbereich</button>
        <button [class.active]="selectedType === 'resource'" (click)="setType('resource')">📚 Ressource</button>
      </div>
      <div class="close-hint" *ngIf="content.length === 0">
        <button class="close-btn" (click)="close()">✕</button>
      </div>
    </div>

    <div class="capture-body">
      <div class="title-hint" *ngIf="selectedType === 'resource'">🔗 URL erkannt: Wird als Ressource gespeichert</div>
      <input 
        #captureInput
        type="text" 
        [(ngModel)]="content" 
        (input)="onInput()"
        (keyup.enter)="save()"
        placeholder="Im Web nach neuen Quellen suchen oder Eintrag erfassen..."
        class="capture-input"
      >
    </div>

    <div class="capture-footer">
      <div class="quick-actions">
        <button class="action-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
          </svg>
          Dateien hochladen
        </button>
        <button class="action-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
          Websites
        </button>
        <button class="action-btn">
          <span>Google Drive</span>
        </button>
        <button class="action-btn">
          <span>Kopierter Text</span>
        </button>
      </div>
      <div class="save-hint">
        <kbd>↵</kbd> zum Speichern
      </div>
    </div>

  </div>
</div>
