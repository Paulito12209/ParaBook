<!-- Header: Transparent mit Floating Pills -->
<header>

    <div class="header-left">
        <!-- Seitentitel Pille (dynamisch) -->
        <div class="page-pill">
            <span class="text">{{ pageTitle() }}</span>
        </div>
    </div>

    <!-- Zentrale Suchleiste als schwebende Pille -->
    <div class="header-search" (click)="openSearch()">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.3-4.3"/>
        </svg>
        <span class="search-text">Suchen...</span>
        <kbd class="search-shortcut">⌘F</kbd>
    </div>

    <!-- Aktionen (Icons + Profil) zusammen in einer Pille gebündelt -->
    <div class="header-actions">
        <button class="icon-btn" aria-label="Hilfe">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
                <line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
        </button>

        <app-theme-toggle></app-theme-toggle>

        <button class="icon-btn notification-btn" aria-label="Benachrichtigungen">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
        </button>

        <div class="user-profile">
            <div class="avatar">
                <img src="profile-icon.png" alt="Avatar">
            </div>
            <div class="user-info">
                <span class="user-name">Paul</span>
                <span class="user-role">Personal</span>
            </div>
        </div>
    </div>

</header>
