<!-- Header: Transparent mit Floating Pills -->
<header>

    <div class="header-left">
        <!-- Seitentitel Pille (dynamisch) -->
        <div class="page-pill">
            <span class="text">{{ pageTitle() }}</span>
        </div>

        <!-- Verantwortlichen-Filter Pille -->
        <div class="assignee-pill" [class.active]="isAssigneeDropdownOpen" (click)="toggleAssigneeDropdown($event)">
            <span class="role-text">{{ getCurrentRole() }}</span>
            <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="m6 9 6 6 6-6"/>
            </svg>

            <div class="dropdown" [class.show]="isAssigneeDropdownOpen">
            <button class="dropdown-item" 
                    [class.active]="appState.getPageRole(router.url) === 'all'"
                    (click)="selectRole('all', $event)">
                <span class="subtext">Ohne Filter</span>
            </button>
            <button class="dropdown-item" 
                    [class.active]="appState.getPageRole(router.url) === 'assignee'"
                    (click)="selectRole('assignee', $event)">
                <span class="subtext">Verantwortliche/r</span>
            </button>
            <button class="dropdown-item" 
                    [class.active]="appState.getPageRole(router.url) === 'participant'"
                    (click)="selectRole('participant', $event)">
                <span class="subtext">Teilnehmer/in</span>
            </button>
        </div>
        </div>
    </div>

    <!-- Zentrale Suchleiste als schwebende Pille -->
    <div class="header-search" (click)="openSearch()">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.3-4.3"/>
        </svg>
        <span class="search-text">Suchen...</span>
        <kbd class="search-shortcut">⌘F</kbd>
    </div>

    <!-- Aktionen (Icons + Profil) zusammen in einer Pille gebündelt -->
    <div class="header-actions">
        <app-theme-toggle></app-theme-toggle>

        <div class="user-profile" (click)="goToProfile()">
            <div class="avatar">
                <img [src]="appState.userPhoto()" alt="Avatar">
            </div>
            <div class="user-info">
                <span class="user-name">{{ appState.userDisplayName() }}</span>
                <span class="user-role">Founder</span>
            </div>
        </div>
    </div>

</header>
