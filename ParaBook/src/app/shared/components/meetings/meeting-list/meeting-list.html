<div class="meeting-list">
    <button class="add-meeting-btn" (click)="onAdd()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="16"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
        Add New Meeting
    </button>

    <div class="list-items">
        @for (meeting of meetings; track meeting.id) {
            <div 
                class="meeting-card" 
                [class.active]="selectedMeetingId === meeting.id"
                (click)="selectMeeting(meeting)">
                
                <div class="meeting-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                </div>

                <div class="meeting-info">
                    <span class="title">{{ meeting.title }}</span>
                    <span class="date">{{ meeting.scheduledFor | date:'dd.MM.yyyy HH:mm' }}</span>
                </div>
            </div>
        } @empty {
            <div class="empty-state">Keine Meetings gefunden</div>
        }
    </div>
</div>
