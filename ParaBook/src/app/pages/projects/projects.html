<div class="projects-page">
  <app-shared-project-list 
    [projects]="projectsList()" 
    (projectSelected)="onProjectSelected($event)">
  </app-shared-project-list>
  
  <app-shared-project-details 
    [project]="selectedProject"
    (backToProjectList)="selectedProjectId = null">
  </app-shared-project-details>
</div>
