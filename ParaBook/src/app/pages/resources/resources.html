<div class="resources-page split-view">
    <div class="list-col">
        <app-resource-list 
            [resources]="allResources()" 
            (resourceSelected)="onResourceSelected($event)">
        </app-resource-list>
    </div>
    <div class="details-col" [class.visible]="selectedResource()">
        <app-resource-details 
            [resource]="selectedResource()" 
            (close)="onCloseDetails()">
        </app-resource-details>
    </div>
</div>
