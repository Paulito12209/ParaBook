<div class="tasks-page split-view">
    <div class="list-col" [style.width.px]="appState.globalSidebarWidth()">
        <app-task-list 
            [tasks]="tasks()" 
            (taskSelected)="onTaskSelected($event)"
            (addTask)="onAddTask()"
            (toggleStatus)="onToggleStatus($event)">
        </app-task-list>
    </div>

    <div class="resize-handle" (mousedown)="startResizing($event)"></div>

    <div class="details-col" [class.visible]="selectedTaskId">
        <app-task-details 
            [task]="selectedTask" 
            (close)="selectedTaskId = null; selectedTask = null"
            (delete)="onDeleteTask($event)">
        </app-task-details>
    </div>
</div>
