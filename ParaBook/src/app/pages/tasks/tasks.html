<div class="page-container">
  <header class="page-header">
    <div class="header-title">
      <span class="badge">{{ tasks().length }}</span> Aufgaben
    </div>
    <div class="header-actions">
      <!-- Quick Add Inline Form -->
      <div class="quick-add">
        <input 
          type="text" 
          [(ngModel)]="newTaskTitle" 
          (keyup.enter)="addTask()"
          placeholder="Neue Aufgabe (Drücke Enter)..."
          class="input-premium"
        >
        <button class="btn btn-primary" (click)="addTask()">Hinzufügen</button>
      </div>
    </div>
  </header>

  <div class="task-list">
    @for (task of tasks(); track task.id) {
      <div class="task-card" [class.completed]="task.status === 'erledigt'">
        <div class="task-checkbox" (click)="toggleStatus(task)">
          <span class="check-icon" *ngIf="task.status === 'erledigt'">✓</span>
        </div>
        
        <div class="task-content">
          <span class="task-title">{{ task.title }}</span>
          <div class="task-meta">
            <span class="badge priority">{{ task.priority }}</span>
            <span class="badge status">{{ task.status }}</span>
          </div>
        </div>

        <div class="task-actions">
          <button class="btn btn-icon" (click)="deleteTask(task.id)" title="Löschen">🗑️</button>
        </div>
      </div>
    } @empty {
      <div class="empty-state">
        <div class="empty-icon">✓</div>
        <p>Keine Aufgaben vorhanden. Erfasse eine neue Aufgabe!</p>
      </div>
    }
  </div>
</div>
