<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>ParaBook</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="parabook-logo.png">
  <script>
    (function() {
      const savedTheme = localStorage.getItem('parabook-theme');
      const systemTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', savedTheme || systemTheme);
    })();
  </script>
</head>

<body>
  <app-root></app-root>
</body>

</html>
